templates:
  plan_title: |
    ## 📋 Terraform Plan（人間レビュー用）

  terraform_plan: |
    {{if .CreatedResources}}
    <details><summary><strong>🆕 作成されるリソース ({{len .CreatedResources}}件)</strong></summary>

    {{range .CreatedResources}}
    - `{{.}}`
    {{- end}}
    </details>
    {{end}}

    {{if .UpdatedResources}}
    <details><summary><strong>🔄 更新されるリソース ({{len .UpdatedResources}}件)</strong></summary>

    {{range .UpdatedResources}}
    - `{{.}}`
    {{- end}}
    </details>
    {{end}}

    {{if .DeletedResources}}
    <details><summary><strong>🗑️ 削除されるリソース ({{len .DeletedResources}}件)</strong></summary>

    {{range .DeletedResources}}
    - `{{.}}`
    {{- end}}
    </details>
    {{end}}

    {{if .ReplacedResources}}
    <details><summary><strong>♻️ 再作成されるリソース ({{len .ReplacedResources}}件)</strong></summary>

    {{range .ReplacedResources}}
    - `{{.}}`
    {{- end}}
    </details>
    {{end}}

    {{if .ChangedResult}}
    <details><summary><strong>📝 Plan詳細</strong></summary>

    ```
    {{.ChangedResult}}
    ```
    </details>
    {{end}}

    {{if .Warning}}
    ### ⚠️ 警告

    ```
    {{.Warning}}
    ```
    {{end}}

    {{if .ErrorMessages}}
    ### ❌ エラー

    ```
    {{range .ErrorMessages}}
    {{.}}
    {{- end}}
    ```
    {{end}}

    ---

    **変更サマリ**: Plan: {{.AddOrUpdateOrDelete.Add}} to add, {{.AddOrUpdateOrDelete.Change}} to change, {{.AddOrUpdateOrDelete.Delete}} to destroy

    *このコメントは人間エンジニアが内容を確認するためのものです。AIレビューは別途実行されます。*

  result: |
    {{if .Link}}
    [:memo: CI結果]({{.Link}})
    {{end}}
